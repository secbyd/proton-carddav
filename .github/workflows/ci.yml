name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # ── 1. build & vet ──────────────────────────────────────────────────────────
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  # ── 2. test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test -count=1 -timeout=120s ./...

  # ── 3. tidy check ─────────────────────────────────────────────────────────
  tidy-check:
    name: go mod tidy check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go mod tidy
        run: go mod tidy

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code go.mod go.sum; then
            echo ""
            echo "ERROR: go.mod or go.sum is out of date."
            echo "Run 'go mod tidy' locally and commit the result."
            exit 1
          fi
